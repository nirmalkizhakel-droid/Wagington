<script>

var SUPA_URL = 'https://rvosetueszwlhubmrcdg.supabase.co';
var SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ2b3NldHVlc3p3bGh1Ym1yY2RnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3NzcyNjEsImV4cCI6MjA5MjM1MzI2MX0.VmMpgp7akkNZvz3KF8rupAQUIYnb99TUyo-TbEk8GWY';

// ─── SUPABASE HELPERS ─────────────────────────────────────────────────────────
function supaFetch(method, path, body){
  var opts = {
    method: method,
    headers: {
      'apikey': SUPA_KEY,
      'Authorization': 'Bearer '+SUPA_KEY,
      'Content-Type': 'application/json',
      'Prefer': method==='POST' ? 'resolution=merge-duplicates,return=representation' : ''
    }
  };
  if(body) opts.body = JSON.stringify(body);
  return fetch(SUPA_URL+'/rest/v1/'+path, opts).then(function(r){
    if(!r.ok) return r.text().then(function(t){ 
      console.error('Supabase error:', method, path, r.status, t);
      throw new Error(r.status+': '+t); 
    });
    return r.json().catch(function(){ return []; });
  }).catch(function(e){
    console.error('Fetch failed:', method, path, e.message);
    throw e;
  });
}

function loadLogs(){
  return supaFetch('GET','walk_logs?select=date_key,session,by_user,covered,missed&order=date_key.asc')
    .then(function(rows){
      var logs = {};
      rows.forEach(function(r){
        if(!logs[r.date_key]) logs[r.date_key] = {};
        logs[r.date_key][r.session] = {
          by: r.by_user,
          covered: r.covered,
          missed: r.missed
        };
      });
      return logs;
    });
}

function saveLog(key, session, type, byUser){
  var row = {
    date_key: key,
    session:  session,
    by_user:  type==='missed' ? null : byUser,
    covered:  type==='covered',
    missed:   type==='missed'
  };
  // upsert via POST with merge-duplicates prefer header
  return supaFetch('POST','walk_logs', row);
}

function deleteLog(key, session){
  return supaFetch('DELETE','walk_logs?date_key=eq.'+key+'&session=eq.'+session, null);
}

function loadVacations(){
  return supaFetch('GET','vacations?select=start_date,end_date&order=start_date.asc').then(function(rows){ return rows||[]; });
}
function saveVacation(start, end){
  return supaFetch('POST','vacations', {start_date:start, end_date:end});
}
function deleteVacation(start, end){
  return supaFetch('DELETE','vacations?start_date=eq.'+start+'&end_date=eq.'+end, null);
}

// ─── CONSTANTS ────────────────────────────────────────────────────────────────
var START   = new Date(2026,3,22);
var USERS   = ['Nisha','Nirmal'];
var MONTHS  = ['January','February','March','April','May','June','July','August','September','October','November','December'];
var SHORT_M = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

// ─── DATE HELPERS ─────────────────────────────────────────────────────────────
function dk(d){ return d.getFullYear()+'-'+p2(d.getMonth()+1)+'-'+p2(d.getDate()); }
function p2(n){ return String(n).padStart(2,'0'); }
function fromDk(k){ var p=k.split('-').map(Number); return new Date(p[0],p[1]-1,p[2]); }
function addDays(d,n){ var r=new Date(d); r.setDate(r.getDate()+n); return r; }
function today0(){ var t=new Date(); t.setHours(0,0,0,0); return t; }
function isWagDay(d){ var w=d.getDay(); return w===2||w===4; }

// ─── SCHEDULE ENGINE (balance-based) ─────────────────────────────────────────
// mBal = Nisha_walks_done - Nirmal_walks_done (morning session)
// positive → Nisha ahead → assign Nirmal. negative → Nirmal ahead → assign Nisha. zero → tiebreak alternation.
// Covered: credit goes to the coverer. Missed: no credit, no balance change, same person assigned next.
function buildSchedule(logs, upTo, vacations){
  var vacs = vacations || state.vacations || [];
  var result = {};
  var end = upTo || addDays(today0(), 120);
  var cur = new Date(START);
  var mBal=0, eBal=0;
  var mTurn=0, eTurn=0;

  function isVacFull(key){
    for(var i=0;i<vacs.length;i++){
      var v=vacs[i];
      if(key>v.start_date && key<=v.end_date) return true;
    }
    return false;
  }
  function isVacStart(key){
    for(var i=0;i<vacs.length;i++){
      if(vacs[i].start_date===key) return true;
    }
    return false;
  }

  while(cur <= end){
    var key = dk(cur);
    var log = logs[key] || {};
    var wag = isWagDay(cur);
    var vacFull = isVacFull(key);   // full vacation day: both morning+evening = Wagington
    var vacStart = isVacStart(key); // start day: morning = normal, evening = Wagington

    // Assign morning
    var mAssigned;
    if(vacFull){
      mAssigned = 'Wagington';
    } else {
      if(mBal > 0)      mAssigned = 'Nirmal';
      else if(mBal < 0) mAssigned = 'Nisha';
      else              mAssigned = USERS[mTurn % 2];
    }

    // Assign evening
    var eAssigned = 'Masha';
    if(vacFull || vacStart){
      eAssigned = 'Wagington';
    } else if(!wag){
      if(eBal > 0)      eAssigned = 'Nirmal';
      else if(eBal < 0) eAssigned = 'Nisha';
      else              eAssigned = USERS[eTurn % 2];
    }

    result[key] = { morning: mAssigned, evening: eAssigned };

    // Advance morning balance (skip vacation full days)
    if(!vacFull){
      var mLog = log.morning;
      if(!(mLog && mLog.missed)){
        var mDoer = (mLog && mLog.covered) ? mLog.by : mAssigned;
        if(mDoer === 'Nisha') mBal++; else mBal--;
        mTurn++;
      }
    }

    // Advance evening balance (skip vacation days and wag days)
    if(!wag && !vacFull && !vacStart){
      var eLog = log.evening;
      if(!(eLog && eLog.missed)){
        var eDoer = (eLog && eLog.covered) ? eLog.by : eAssigned;
        if(eDoer === 'Nisha') eBal++; else eBal--;
        eTurn++;
      }
    }

    cur.setDate(cur.getDate() + 1);
  }

  result._debt = {
    morning: { Nisha: mBal > 0 ? mBal : 0, Nirmal: mBal < 0 ? -mBal : 0 },
    evening: { Nisha: eBal < 0 ? -eBal : 0, Nirmal: eBal > 0 ? eBal : 0 }
  };
  return result;
}

// ─── OLD ENGINE (kept for reference, not used) ────────────────────────────────
function computeSchedule(logs, upTo){
  var result = {};
  var end = upTo || addDays(today0(),120);
  var cur = new Date(START);
  var mNat=0, eNat=0, mX=[0,0], eX=[0,0];

  while(cur<=end){
    var key = dk(cur);
    var log = logs[key]||{};
    var wag = isWagDay(cur);

    // MORNING
    var mIdx = mX[0]>0?0: mX[1]>0?1: mNat%2;
    var mLog = log.morning;
    if(mLog){
      if(mLog.missed){ /* no advance */ }
      else if(mLog.covered){ mX[mIdx]++; mNat++; }
      else { if(mX[mIdx]>0) mX[mIdx]--; else mNat++; }
    } else { if(mX[mIdx]>0) mX[mIdx]--; else mNat++; }

    // EVENING
    var eAssigned = 'Masha';
    if(!wag){
      var eIdx = eX[0]>0?0: eX[1]>0?1: eNat%2;
      eAssigned = USERS[eIdx];
      var eLog = log.evening;
      if(eLog){
        if(eLog.missed){ /* no advance */ }
        else if(eLog.covered){ eX[eIdx]++; eNat++; }
        else { if(eX[eIdx]>0) eX[eIdx]--; else eNat++; }
      } else { if(eX[eIdx]>0) eX[eIdx]--; else eNat++; }
    }

    result[key] = { morning: USERS[mX[0]>0?0:mX[1]>0?1:mNat%2], evening: eAssigned };

    // re-derive morning after advance
    var mIdxFinal = mX[0]>0?0: mX[1]>0?1: mNat%2;
    // (stored before advance above — fix by storing before advancing)
    cur.setDate(cur.getDate()+1);
  }

  result._debt = {
    morning:{ Nisha:mX[0], Nirmal:mX[1] },
    evening:{ Nisha:eX[0], Nirmal:eX[1] }
  };
  return result;
}



function getOverallStats(schedule, logs){
  var stats = { Nisha:{morning:0,evening:0}, Nirmal:{morning:0,evening:0} };
  var today = today0();
  for(var k in schedule){
    if(k[0]==='_') continue;
    var d = fromDk(k);
    if(d>today) continue;
    var v=schedule[k], log=logs[k]||{};
    if(v.morning&&v.morning!=='Masha'){
      var ml=log.morning;
      if(ml&&!ml.missed){ var mw=ml.covered?ml.by:v.morning; if(stats[mw]) stats[mw].morning++; }
      else if(!ml){ if(stats[v.morning]) stats[v.morning].morning++; }
    }
    if(v.evening&&v.evening!=='Masha'){
      var el2=log.evening;
      if(el2&&!el2.missed){ var ew=el2.covered?el2.by:v.evening; if(stats[ew]) stats[ew].evening++; }
      else if(!el2){ if(stats[v.evening]) stats[v.evening].evening++; }
    }
  }
  return stats;
}

// ─── STATE ────────────────────────────────────────────────────────────────────
var state = {
  user:      localStorage.getItem('wag_user')||null,
  logs:      {},
  vacations: [], // [{start_date:'YYYY-MM-DD', end_date:'YYYY-MM-DD'}]
  tab:       'home',
  calM:      new Date().getMonth(),
  calY:      new Date().getFullYear(),
  loading:   true,
  syncing:   false,
  error:     null,
  showVacModal: false,
  vacFrom:   '',
  vacTo:     ''
};

// Returns true if date key is a vacation day (but NOT the start day morning)
function isVacationFull(key){
  for(var i=0;i<state.vacations.length;i++){
    var v=state.vacations[i];
    if(key>v.start_date && key<=v.end_date) return true;
  }
  return false;
}
// Returns true if date is start day of vacation (morning still done by Nisha/Nirmal)
function isVacationStart(key){
  for(var i=0;i<state.vacations.length;i++){
    if(state.vacations[i].start_date===key) return true;
  }
  return false;
}

// ─── SYNC ─────────────────────────────────────────────────────────────────────
function syncFromServer(){
  state.syncing = true;
  renderSyncDot();
  var logsPromise = loadLogs().catch(function(e){ console.log('logs err',e); return null; });
  var vacPromise  = loadVacations().catch(function(e){ console.log('vac err',e); return null; });
  return Promise.all([logsPromise, vacPromise]).then(function(res){
    if(res[0] !== null) state.logs      = res[0];
    if(res[1] !== null) state.vacations = res[1];
    state.loading = false;
    state.syncing = false;
    // Only show error if BOTH failed
    state.error = (res[0]===null && res[1]===null) ? 'Sync failed — tap to retry' : null;
    render();
  }).catch(function(e){
    state.syncing = false;
    state.loading = false;
    state.error   = 'Sync failed — tap to retry';
    render();
  });
}

function renderSyncDot(){
  var dot = document.querySelector('.sync-dot');
  if(!dot) return;
  dot.className = 'sync-dot'+(state.syncing?' syncing':state.error?' error':'');
}

// Poll every 15 seconds to stay in sync with other phone
setInterval(function(){
  if(state.user && !state.loading) syncFromServer();
}, 15000);

// ─── ACTIONS ──────────────────────────────────────────────────────────────────
function logWalk(key, session, type, btn){
  if(btn){ btn.disabled=true; }
  state.syncing = true; renderSyncDot();
  saveLog(key, session, type, state.user)
    .then(function(){ return syncFromServer(); })
    .catch(function(){ state.error='Save failed'; state.syncing=false; render(); });
}

function undoWalk(key, session, btn){
  if(btn){ btn.disabled=true; }
  state.syncing = true; renderSyncDot();
  deleteLog(key, session)
    .then(function(){ return syncFromServer(); })
    .catch(function(){ state.error='Undo failed'; state.syncing=false; render(); });
}

// ─── HELPERS ──────────────────────────────────────────────────────────────────
function el(tag,cls){ var e=document.createElement(tag||'div'); if(cls) e.className=cls; return e; }

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render(){
  var app = document.getElementById('app');
  app.innerHTML = '';

  // Loading splash — only show if genuinely first load with no data yet
  if(state.loading && Object.keys(state.logs).length === 0){
    var sp = el('div','splash');
    sp.innerHTML = '<div class="splash-icon">🐾</div><div class="splash-title">Masha Walks</div><div class="spinner"></div><div class="splash-sub">Loading walks...</div>';
    app.appendChild(sp);
    return;
  }
  state.loading = false;

  if(!state.user){ app.appendChild(renderLogin()); return; }

  var today    = today0();
  var todayKey = dk(today);
  var schedule = buildSchedule(state.logs, addDays(today,120));
  var debt     = schedule._debt||{morning:{Nisha:0,Nirmal:0},evening:{Nisha:0,Nirmal:0}};

  // Header
  var hdr = el('div','header');
  var ht  = el('span','header-title'); ht.textContent='🐾 Masha Walks';
  var hr  = el('div','header-right');
  var dot = el('div','sync-dot'+(state.syncing?' syncing':state.error?' error':''));
  var ub  = el('button','header-user');
  ub.textContent = state.user+' ↩';
  ub.onclick = function(){ state.user=null; localStorage.removeItem('wag_user'); render(); };
  hr.appendChild(dot); hr.appendChild(ub);
  hdr.appendChild(ht); hdr.appendChild(hr);
  app.appendChild(hdr);

  // Error banner
  if(state.error){
    var eb = el('div','');
    eb.style.cssText='background:#FDEAEA;color:#5C1A1A;font-size:13px;font-weight:700;padding:10px 18px;text-align:center;';
    eb.textContent='⚠️ '+state.error+' — tap to retry';
    eb.onclick = function(){ state.error=null; syncFromServer(); };
    app.appendChild(eb);
  }

  // Tabs
  var tabs = el('div','tabs');
  [['home','🏠 Home'],['calendar','📅 Calendar']].forEach(function(pair){
    var t = el('div','tab'+(state.tab===pair[0]?' active':''));
    t.textContent = pair[1];
    t.onclick = function(){ state.tab=pair[0]; render(); };
    tabs.appendChild(t);
  });
  app.appendChild(tabs);

  if(state.tab==='home'){
    var scroll = el('div','scroll');

    // Today header
    var th = el('div','today-hdr');
    var tl = el('div','today-lbl'); tl.textContent='Today';
    var tb = el('div','today-big'); tb.textContent=today.toLocaleDateString('en-SG',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
    var ts = el('div','today-sub'); ts.textContent='Logged in as '+state.user;
    th.appendChild(tl); th.appendChild(tb); th.appendChild(ts);
    scroll.appendChild(th);

    var todaySched = schedule[todayKey]||{};
    var todayLog   = state.logs[todayKey]||{};
    scroll.appendChild(renderWalkCard('☀️ Morning Walk','morning',todaySched.morning,todayLog.morning,todayKey,true));
    scroll.appendChild(renderWalkCard('🌙 Evening Walk','evening',todaySched.evening,todayLog.evening,todayKey,true));

    // Overall stats
    var stats = getOverallStats(schedule, state.logs);
    var sc=el('div','card');
    var sct=el('div','card-title'); sct.textContent='📊 Overall Stats'; sc.appendChild(sct);
    ['morning','evening'].forEach(function(sess){
      var sl=el('div','stats-lbl'); sl.textContent=(sess==='morning'?'Morning':'Evening')+' walks'; sc.appendChild(sl);
      var sg=el('div','stats-grid');
      ['Nisha','Nirmal'].forEach(function(u){
        var sb=el('div','stat-box');
        var sl2=el('div','stat-lbl2'); sl2.textContent=(u==='Nisha'?'🌸':'🌿')+' '+u; sb.appendChild(sl2);
        var sn=el('div','stat-num '+u.toLowerCase()); sn.textContent=stats[u][sess]; sb.appendChild(sn);
        sg.appendChild(sb);
      });
      sc.appendChild(sg);
    });
    scroll.appendChild(sc);

    // Tomorrow's schedule
    var tmrw = addDays(today, 1);
    var tmrwKey = dk(tmrw);
    var tmrwSched = schedule[tmrwKey] || {};
    var tmrwCard = el('div','card');
    var tmrwTitle = el('div','card-title'); tmrwTitle.textContent = '📅 Tomorrow's Schedule'; tmrwCard.appendChild(tmrwTitle);

    var tmrwDate = el('div',''); tmrwDate.style.cssText='font-size:12px;color:var(--b4);font-weight:600;margin-bottom:12px;';
    tmrwDate.textContent = tmrw.toLocaleDateString('en-SG',{weekday:'long',day:'numeric',month:'long'});
    tmrwCard.appendChild(tmrwDate);

    ['morning','evening'].forEach(function(sess){
      var assigned = tmrwSched[sess];
      var row = el('div',''); row.style.cssText='display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;';
      var label = el('div',''); label.style.cssText='font-size:13px;color:var(--b4);font-weight:700;';
      label.textContent = sess==='morning' ? '☀️ Morning' : '🌙 Evening';
      var person = el('div','');
      if(assigned==='Wagington'){
        person.style.cssText='font-size:13px;font-weight:800;color:var(--wag);';
        person.textContent='🏖️ Wagington';
      } else if(assigned==='Masha'){
        person.style.cssText='font-size:13px;font-weight:800;color:var(--wag);';
        person.textContent='🐾 Masha';
      } else {
        person.style.cssText='font-size:13px;font-weight:800;color:'+(assigned==='Nisha'?'var(--nisha)':'var(--nirmal)')+';';
        person.textContent=(assigned==='Nisha'?'🌸':'🌿')+' '+assigned;
      }
      row.appendChild(label); row.appendChild(person);
      tmrwCard.appendChild(row);
    });
    scroll.appendChild(tmrwCard);

    app.appendChild(scroll);
    // Vacation modal must be appended to app AFTER scroll so it overlays correctly
    if(state.showVacModal){ app.appendChild(renderVacModal()); }

  } else {
    app.appendChild(renderCalendar(schedule));
  }
}

// ─── WALK CARD ────────────────────────────────────────────────────────────────
function renderWalkCard(label, session, assigned, log, key, isToday){
  var card=el('div','card');
  var ct=el('div','card-title'); ct.textContent=label; card.appendChild(ct);
  var row=el('div','walk-row');
  var left=el('div','');
  var isWagSlot=assigned==='Masha';
  var isMyTurn=assigned===state.user;

  var wname=el('div','walk-name '+(isWagSlot?'wag':(assigned||'').toLowerCase()));
  wname.textContent=isWagSlot?'🐾 Masha':(assigned||'—');
  left.appendChild(wname);
  if(!isWagSlot){
    var meta=el('div','walk-meta');
    meta.textContent=isMyTurn?'← Your turn':(assigned||'')+"'s turn";
    left.appendChild(meta);
  }
  row.appendChild(left);

  var right=el('div','');
  if(isWagSlot){
    var wb=el('span','badge badge-wag'); wb.textContent='Dog walking service'; right.appendChild(wb);
  } else if(log){
    var brow=el('div','badge-row');
    var badge=el('span','');
    if(log.missed){ badge.className='badge badge-missed'; badge.textContent='❌ Missed by both'; }
    else if(log.covered){ badge.className='badge badge-cover'; badge.textContent='🔁 Covered by '+log.by; }
    else { badge.className='badge badge-done'; badge.textContent='✅ Done by '+log.by; }
    brow.appendChild(badge);
    if(isToday){
      var ub2=el('button','btn btn-undo'); ub2.textContent='↩ Undo';
      ub2.onclick=function(){ undoWalk(key,session,ub2); };
      brow.appendChild(ub2);
    }
    right.appendChild(brow);
  } else if(isToday){
    if(isMyTurn){
      var cb=el('button','btn btn-confirm'); cb.textContent='✅ I did this walk';
      cb.onclick=function(){ logWalk(key,session,'confirm',cb); };
      right.appendChild(cb);
    } else {
      var cvb=el('button','btn btn-cover'); cvb.textContent='🔁 I covered this';
      cvb.onclick=function(){ logWalk(key,session,'covered',cvb); };
      right.appendChild(cvb);
    }
    var mb=el('button','btn btn-missed'); mb.textContent='❌ Neither of us walked';
    mb.onclick=function(){ logWalk(key,session,'missed',mb); };
    right.appendChild(mb);
  }
  row.appendChild(right);
  card.appendChild(row);
  return card;
}

// ─── CALENDAR ─────────────────────────────────────────────────────────────────
function renderCalendar(schedule){
  var wrap=el('div',''); wrap.style.cssText='flex:1;overflow-y:auto;display:flex;flex-direction:column;';
  var today=today0(), todayKey=dk(today), m=state.calM, y=state.calY;

  var nav=el('div','cal-nav');
  var prev=el('button','cal-btn'); prev.textContent='‹';
  prev.onclick=function(){ var nm=state.calM-1,ny=state.calY; if(nm<0){nm=11;ny--;} state.calM=nm;state.calY=ny; render(); };
  var lbl=el('span','cal-month-lbl'); lbl.textContent=MONTHS[m]+' '+y;
  var nxt=el('button','cal-btn'); nxt.textContent='›';
  nxt.onclick=function(){ var nm=state.calM+1,ny=state.calY; if(nm>11){nm=0;ny++;} state.calM=nm;state.calY=ny; render(); };
  nav.appendChild(prev); nav.appendChild(lbl); nav.appendChild(nxt);
  wrap.appendChild(nav);

  // Vacation button bar
  var vacBar=el('div',''); vacBar.style.cssText='padding:10px 14px 0;display:flex;justify-content:flex-end;';
  var vacBtn=el('button','btn-vac'); vacBtn.textContent='🏖️ Masha Vacation Dates';
  vacBtn.onclick=function(){ state.showVacModal=true; state.vacFrom=''; state.vacTo=''; render(); };
  // Always append modal to app after calendar render if needed
  vacBar.appendChild(vacBtn);
  wrap.appendChild(vacBar);

  var inner=el('div','cal-inner');
  var dow=el('div','cal-dow');
  ['Su','Mo','Tu','We','Th','Fr','Sa'].forEach(function(d){ var dl=el('div','cal-dow-lbl'); dl.textContent=d; dow.appendChild(dl); });
  inner.appendChild(dow);

  var firstDay=new Date(y,m,1), lastDay=new Date(y,m+1,0), startDow=firstDay.getDay();
  var cells=[];
  for(var i=startDow-1;i>=0;i--) cells.push({date:addDays(firstDay,-i-1),other:true});
  for(var d=new Date(firstDay);d<=lastDay;d.setDate(d.getDate()+1)) cells.push({date:new Date(d),other:false});
  while(cells.length%7!==0) cells.push({date:addDays(cells[cells.length-1].date,1),other:true});

  var grid=el('div','cal-grid2');
  for(var w=0;w<cells.length;w+=7){
    var week=el('div','cal-week');
    for(var i2=0;i2<7;i2++){
      var c=cells[w+i2], key=dk(c.date), sch=schedule[key]||{}, log=state.logs[key]||{};
      var isToday2=key===todayKey, isPast=c.date<today;
      var cls='cal-cell'+(isToday2?' is-today':'')+(c.other?' other':'')+(isPast&&!isToday2?' past':'');
      var cell=el('div',cls);
      if(isToday2){ var td=el('div','today-dot'); td.textContent=c.date.getDate(); cell.appendChild(td); }
      else { var cd=el('div','cal-date2'); cd.textContent=c.date.getDate(); cell.appendChild(cd); }
      if(!c.other){
        var mA=sch.morning;
        if(mA){
          var ms=el('div','cslot'), ml=log.morning;
          if(mA==='Wagington')    {ms.className='cslot cs-vac';    ms.textContent='🏖️Vac';}
          else if(ml&&ml.missed)  {ms.className='cslot cs-missed'; ms.textContent='❌Miss';}
          else if(ml&&ml.covered) {ms.className='cslot cs-cover';  ms.textContent='🔁'+(ml.by||'').slice(0,3);}
          else if(ml||isPast)     {ms.className='cslot cs-done';   ms.textContent='✅'+mA.slice(0,3);}
          else                    {ms.className='cslot cs-'+(mA==='Nisha'?'nisha':'nirmal'); ms.textContent=(mA==='Nisha'?'🌸':'🌿')+mA.slice(0,3);}
          cell.appendChild(ms);
        }
        var eA=sch.evening;
        if(eA){
          var es=el('div','cslot'), el3=log.evening;
          if(eA==='Wagington')        {es.className='cslot cs-vac';    es.textContent='🏖️Vac';}
          else if(eA==='Masha')       {es.className='cslot cs-wag';    es.textContent='🐾Wag';}
          else if(el3&&el3.missed)    {es.className='cslot cs-missed'; es.textContent='❌Miss';}
          else if(el3&&el3.covered)   {es.className='cslot cs-cover';  es.textContent='🔁'+(el3.by||'').slice(0,3);}
          else if(el3||isPast)        {es.className='cslot cs-done';   es.textContent='✅'+eA.slice(0,3);}
          else                        {es.className='cslot cs-'+(eA==='Nisha'?'nisha':'nirmal'); es.textContent=(eA==='Nisha'?'🌸':'🌿')+eA.slice(0,3);}
          cell.appendChild(es);
        }
      }
      week.appendChild(cell);
    }
    grid.appendChild(week);
  }
  inner.appendChild(grid);
  wrap.appendChild(inner);
  // Append vacation modal overlay after returning wrap
  setTimeout(function(){
    if(state.showVacModal && !document.querySelector('.modal-overlay')){
      document.getElementById('app').appendChild(renderVacModal());
    }
  }, 0);
  return wrap;
}


// ─── VACATION MODAL ───────────────────────────────────────────────────────────
function renderVacModal(){
  var overlay=el('div','modal-overlay');
  overlay.onclick=function(e){ if(e.target===overlay){ state.showVacModal=false; render(); } };
  var modal=el('div','modal');

  var mt=el('div','modal-title'); mt.textContent='🏖️ Masha Vacation Dates'; modal.appendChild(mt);

  if(state.vacations.length>0){
    var vl=el('div','vac-list');
    state.vacations.forEach(function(v){
      var vi=el('div','vac-item');
      var vt=el('div','vac-item-text'); vt.textContent=v.start_date+' → '+v.end_date; vi.appendChild(vt);
      var vd=el('button','vac-del'); vd.textContent='✕';
      (function(vs,ve){
        vd.onclick=function(){
          state.syncing=true; renderSyncDot();
          deleteVacation(vs,ve).then(syncFromServer).catch(function(){ state.error='Delete failed'; state.syncing=false; render(); });
        };
      })(v.start_date,v.end_date);
      vi.appendChild(vd); vl.appendChild(vi);
    });
    modal.appendChild(vl);
  } else {
    var none=el('div',''); none.style.cssText='font-size:13px;color:var(--b4);margin-bottom:14px;font-style:italic;';
    none.textContent='No vacations added yet'; modal.appendChild(none);
  }

  var addTitle=el('div',''); addTitle.style.cssText='font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--b4);margin-bottom:10px;';
  addTitle.textContent='Add New Vacation'; modal.appendChild(addTitle);

  var fromRow=el('div','modal-row');
  var fromLbl=el('div','modal-label'); fromLbl.textContent='From'; fromRow.appendChild(fromLbl);
  var fromIn=el('input','modal-input'); fromIn.type='date'; fromIn.value=state.vacFrom||'';
  fromIn.onchange=function(){ state.vacFrom=this.value; };
  fromRow.appendChild(fromIn); modal.appendChild(fromRow);

  var toRow=el('div','modal-row');
  var toLbl=el('div','modal-label'); toLbl.textContent='To'; toRow.appendChild(toLbl);
  var toIn=el('input','modal-input'); toIn.type='date'; toIn.value=state.vacTo||'';
  toIn.onchange=function(){ state.vacTo=this.value; };
  toRow.appendChild(toIn); modal.appendChild(toRow);

  var hint=el('div',''); hint.style.cssText='font-size:11px;color:var(--b4);margin-bottom:14px;';
  hint.textContent='Morning of start date stays with Nisha/Nirmal. All other slots go to Wagington.';
  modal.appendChild(hint);

  var btnRow=el('div',''); btnRow.style.cssText='display:flex;gap:10px;';
  var saveBtn=el('button','btn btn-confirm'); saveBtn.textContent='Save Vacation';
  saveBtn.onclick=function(){
    if(!state.vacFrom||!state.vacTo){ alert('Please select both dates'); return; }
    if(state.vacTo<state.vacFrom){ alert('End date must be after start date'); return; }
    state.syncing=true; renderSyncDot();
    saveVacation(state.vacFrom,state.vacTo).then(function(){
      state.showVacModal=false;
      return syncFromServer();
    }).catch(function(){ state.error='Save failed'; state.syncing=false; render(); });
  };
  var cancelBtn=el('button','btn btn-undo'); cancelBtn.textContent='Cancel';
  cancelBtn.onclick=function(){ state.showVacModal=false; render(); };
  btnRow.appendChild(saveBtn); btnRow.appendChild(cancelBtn);
  modal.appendChild(btnRow);

  overlay.appendChild(modal);
  return overlay;
}

// ─── LOGIN ────────────────────────────────────────────────────────────────────
function renderLogin(){
  var wrap=el('div',''); wrap.style.cssText='max-width:430px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;background:var(--bg);';
  var login=el('div','login');
  var icon=el('div','login-icon'); icon.textContent='🐾'; login.appendChild(icon);
  var title=el('div','login-title'); title.textContent='Masha Walks'; login.appendChild(title);
  var sub=el('div','login-sub'); sub.textContent="Who's taking the lead today?"; login.appendChild(sub);
  var bn=el('button','login-btn login-nisha'); bn.textContent="🌸  I'm Nisha";
  bn.onclick=function(){ state.user='Nisha'; localStorage.setItem('wag_user','Nisha'); render(); };
  var bnr=el('button','login-btn login-nirmal'); bnr.textContent="🌿  I'm Nirmal";
  bnr.onclick=function(){ state.user='Nirmal'; localStorage.setItem('wag_user','Nirmal'); render(); };
  var hint=el('div','login-hint'); hint.textContent='Walks sync across both phones in real time';
  login.appendChild(bn); login.appendChild(bnr); login.appendChild(hint);
  wrap.appendChild(login);
  return wrap;
}

// ─── BOOT ─────────────────────────────────────────────────────────────────────
render(); // show loading splash immediately
syncFromServer(); // then fetch from Supabase
</script>
